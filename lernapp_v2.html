<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Quiz Lernapp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1A73E8;
            --success: #26A69A;
            --danger: #EF5350;
            --warning: #FFB74D;
            --text-primary: #E8EAED;
            --text-secondary: #B0BEC5;
            --bg-main: #1F1F2A;
            --bg-window: #292B3D;
            --border: #3F4259;
            --border-dark: #121428;
            --border-light: #4D516A;
        }

        body {
            font-family: 'MS Sans Serif', 'Lucida Grande', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }

        .app-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-window);
            border: 2px solid var(--border);
            border-top: 2px solid var(--border-light);
            border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark);
            border-bottom: 2px solid var(--border-dark);
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark);
        }

        .header {
            background: linear-gradient(to right, #2560B8, #1C3D7A);
            color: #F2F5FB;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #0F2244;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 18px; margin-bottom: 4px; }
        .header p { font-size: 12px; color: var(--text-secondary); }
        .header-left h1, .header-left p { margin: 0; }
        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
        }
        .header-right a {
            color: #fff;
            text-decoration: none;
            padding: 4px 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            cursor: pointer;
        }
        .header-right a:hover {
            background: rgba(255,255,255,0.25);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px;
        }

        .category-btn {
            position: relative;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 50%, #2a2a2a 100%);
            border: 2px solid var(--border);
            border-top: 2px solid var(--border-light);
            border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark);
            border-bottom: 2px solid var(--border-dark);
            padding: 20px;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 12px;
            text-align: center;
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark), 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 50%, #3a3a3a 100%);
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark), 0 0 15px rgba(0,0,0,0.7);
        }

        .cat-icon { font-size: 24px; display: block; margin-bottom: 8px; }
        .cat-name { font-weight: bold; font-size: 14px; }
        .cat-count { font-size: 11px; color: var(--text-secondary); }

        .hidden { display: none !important; }

        .setup-card {
            background: var(--bg-window);
            border: 2px solid var(--border);
            border-top: 2px solid var(--border-light);
            border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark);
            border-bottom: 2px solid var(--border-dark);
            margin: 20px;
            padding: 15px;
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark);
        }

        .setup-card h2, .setup-card h3 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 5px;
            font-size: 12px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .slider {
            flex: 1;
            height: 20px;
            border: 1px solid var(--border-dark);
            background: var(--bg-window);
            outline: none;
        }

        .number-input {
            width: 60px;
            padding: 2px;
            border: 1px solid var(--border-dark);
            border-top: 1px solid var(--border-light);
            border-left: 1px solid var(--border-light);
            border-right: 1px solid var(--border-dark);
            border-bottom: 1px solid var(--border-dark);
            background: var(--bg-window);
            color: var(--text-primary);
            text-align: center;
            font-weight: bold;
            font-size: 12px;
        }

        .mode-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .mode-btn {
            background: var(--bg-window);
            border: 2px solid var(--border);
            border-top: 2px solid var(--border-light);
            border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark);
            border-bottom: 2px solid var(--border-dark);
            padding: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
            font-size: 12px;
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark);
        }

        .mode-btn:hover {
            background: #E0E0E0;
        }

        .mode-icon { font-size: 20px; }
        .mode-text { display: flex; flex-direction: column; gap: 2px; }
        .mode-text strong { color: var(--text-primary); font-size: 13px; }
        .mode-text small { color: var(--text-secondary); font-size: 11px; }

        .btn {
            padding: 4px 12px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--border-light);
            border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark);
            border-bottom: 2px solid var(--border-dark);
            background: var(--bg-window);
            color: var(--text-primary);
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark);
        }

        .btn:hover {
            background: #E0E0E0;
        }

        .btn:active {
            box-shadow: inset -1px -1px 0 var(--border-light), inset 1px 1px 0 var(--border-dark);
        }

        .btn-submit { background: var(--success); color: white; }
        .btn-nav { flex: 1; padding: 6px; }

        .question-card {
            background: var(--bg-window);
            border: 2px solid var(--border);
            border-top: 2px solid var(--border-light);
            border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark);
            border-bottom: 2px solid var(--border-dark);
            margin: 20px;
            padding: 15px;
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark);
        }

        .question-text {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--bg-window);
            border: 1px solid var(--border-dark);
            border-top: 1px solid var(--border-light);
            border-left: 1px solid var(--border-light);
            border-right: 1px solid var(--border-dark);
            border-bottom: 1px solid var(--border-dark);
            cursor: pointer;
            color: var(--text-primary);
            font-size: 12px;
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark);
        }

        .option-btn:hover:not(:disabled) {
            background: #E0E0E0;
        }

        .option-checkbox {
            width: 16px;
            height: 16px;
            border: 1px solid var(--border-dark);
            background: var(--bg-window);
            flex-shrink: 0;
        }

        .option-btn.correct-answer {
            background: #C0FFC0;
        }

        .option-btn.wrong-answer {
            background: #FFC0C0;
        }

        .option-btn.selected {
            background: #FFFFC0;
        }

        .quiz-header {
            background: linear-gradient(to right, #0054E3, #3E7EFF);
            color: white;
            padding: 8px 12px;
            margin: 20px 20px 0 20px;
            border-bottom: 1px solid #003399;
        }

        .quiz-mode-badge {
            display: inline-block;
            background: #FFFFC0;
            color: black;
            padding: 2px 8px;
            border: 1px solid var(--border-dark);
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .quiz-header h2 {
            font-size: 16px;
            color: white;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 16px;
            background: var(--bg-window);
            border: 1px solid var(--border-dark);
            border-top: 1px solid var(--border-light);
            border-left: 1px solid var(--border-light);
            border-right: 1px solid var(--border-dark);
            border-bottom: 1px solid var(--border-dark);
            overflow: hidden;
            margin-bottom: 5px;
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark);
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.4s ease;
        }

        .stats {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .stat {
            padding: 4px 8px;
            border: 1px solid var(--border-dark);
            font-weight: bold;
            font-size: 11px;
        }

        .stat.correct { background: #C0FFC0; color: green; }
        .stat.wrong { background: #FFC0C0; color: red; }
        .stat.info { background: #FFFFC0; color: black; }

        .result-card {
            background: #FFFFC0;
            border: 2px solid var(--border);
            margin: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: inset 1px 1px 0 var(--border-light), inset -1px -1px 0 var(--border-dark);
        }

        .result-card h3 { font-size: 18px; color: var(--text-primary); margin-bottom: 15px; }
        .result-card.success { background: #C0FFC0; }
        .result-card.success h3 { color: green; }
        .result-card.fail { background: #FFC0C0; }
        .result-card.fail h3 { color: red; }

        .nav-footer {
            display: flex;
            gap: 8px;
            margin: 20px;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .app-container { margin: 0; }
            .mode-group { grid-template-columns: 1fr; }
            .category-grid { gap: 10px; margin: 10px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- MENU -->
        <div id="menu-view">
            <div class="header">
                <div class="header-left">
                    <h1>📚 Quiz Lernapp</h1>
                    <p>Verbessere dein Linux-Wissen!</p>
                </div>
                <div class="header-right">
                    <span id="menu-user-status"></span>
                    <a href="/" onclick="logoutUser(); return false;">Abmelden</a>
                </div>
            </div>

            <div class="category-grid" id="category-grid"></div>
        </div>

        <!-- SETUP -->
        <div id="setup-view" class="hidden">
            <div class="setup-card">
                <h2>⚙️ Quiz Einstellungen</h2>
                <p style="font-size: 1.1em; color: var(--text-secondary); margin-bottom: 30px;">Kategorie: <strong id="setup-category"></strong></p>

                <div class="form-group">
                    <label>Anzahl Fragen:</label>
                    <div class="input-group">
                        <input type="range" id="question-range" min="1" max="10" value="5" class="slider">
                        <input type="number" id="question-number" min="1" max="10" value="5" class="number-input">
                    </div>
                </div>

                <div class="form-group">
                    <label>Modus wählen:</label>
                    <div class="mode-group">
                        <button class="mode-btn" onclick="startQuiz('learning')">
                            <span class="mode-icon">📖</span>
                            <span class="mode-text"><strong>Learning</strong><small>Antworten sichtbar</small></span>
                        </button>
                        <button class="mode-btn" onclick="startQuiz('test')">
                            <span class="mode-icon">✏️</span>
                            <span class="mode-text"><strong>Test</strong><small>Antworten verborgen</small></span>
                        </button>
                    </div>
                </div>

                <button class="btn" onclick="goToMenu()">← Zurück</button>
            </div>
        </div>

        <!-- QUIZ -->
        <div id="quiz-view" class="hidden">
            <div class="quiz-header">
                <div class="quiz-mode-badge" id="mode-badge"></div>
                <h2 id="quiz-category"></h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p style="font-size: 0.9em; color: var(--text-secondary); margin: 0;" id="progress-text"></p>
                <div class="stats" id="stats" style="display: none;">
                    <span class="stat correct" id="stat-correct">✅ 0</span>
                    <span class="stat wrong" id="stat-wrong">❌ 0</span>
                    <span class="stat info" id="stat-quota">📊 0%</span>
                </div>
            </div>

            <div class="question-card">
                <h3 class="question-text" id="question-text"></h3>
                <div id="answer-section"></div>
            </div>

            <div class="nav-footer">
                <button class="btn btn-nav" id="btn-prev" onclick="goPrev()">← Zurück</button>
                <button class="btn btn-nav" id="btn-next" onclick="goNext()">Weiter →</button>
                <button class="btn btn-nav" onclick="goToMenu()">🏠 Menü</button>
            </div>

            <div id="result-section"></div>
        </div>
    </div>

    <script>
    let fragenpool = {};
    let selectedCategory = null;
    let currentQuizMode = null;
    let questions = [];
    let currentIdx = 0;
    let showAnswer = false;
    let stats = { correct: 0, wrong: 0 };
    let userAnswers = {};
    let quizFinished = false;
    let selectedAnswer = null;
    let currentUser = null;

    const API = '';

    // ═══════════════════════════════════════════════════════════════════════════════
    // INIT & AUTH
    // ═══════════════════════════════════════════════════════════════════════════════

    function checkAuth() {
        // Zuerst Portal-Session prüfen
        try {
            const portalUser = localStorage.getItem('portalUser');
            if (portalUser) {
                currentUser = JSON.parse(portalUser);
                if (currentUser && currentUser.id) {
                    localStorage.setItem('lernappUser', portalUser);
                    return true;
                }
            }
        } catch (e) {}

        // Falls nicht: Alte Lernapp-Session
        try {
            const lernappUser = localStorage.getItem('lernappUser');
            if (lernappUser) {
                currentUser = JSON.parse(lernappUser);
                if (currentUser && currentUser.id) {
                    return true;
                }
            }
        } catch (e) {}

        return false;
    }

    function logoutUser() {
        currentUser = null;
        localStorage.removeItem('lernappUser');
        localStorage.removeItem('portalUser');
        window.location.href = '/';
    }

    function updateMenuUser() {
        const el = document.getElementById('menu-user-status');
        if (el && currentUser) {
            el.textContent = `👤 ${currentUser.username}`;
        }
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    // NAVIGATION & VIEWS
    // ═══════════════════════════════════════════════════════════════════════════════

    function showView(id) {
        ['menu-view','setup-view','quiz-view'].forEach(v => {
            const el = document.getElementById(v);
            if (el) el.classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    function goToMenu() {
        showView('menu-view');
        selectedCategory = null;
        currentQuizMode = null;
        loadCategories();
    }

    function goToSetup(cat) {
        if (!currentUser) {
            alert('Bitte meld dich zuerst an.');
            return;
        }
        selectedCategory = cat;
        const max = fragenpool[cat] ? fragenpool[cat].length : 1;
        document.getElementById('setup-category').textContent = cat;
        document.getElementById('question-range').max = max;
        document.getElementById('question-number').max = max;
        showView('setup-view');
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    // DATA LOADING
    // ═══════════════════════════════════════════════════════════════════════════════

    function loadCategories() {
        fetch(API + '/api/load-fragenpool')
            .then(r => r.json())
            .then(data => {
                fragenpool = data;
                renderCategories();
            })
            .catch(e => console.error('Load error:', e));
    }

    function renderCategories() {
        const grid = document.getElementById('category-grid');
        grid.innerHTML = '';
        Object.keys(fragenpool).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'category-btn';
            btn.innerHTML = `<span class="cat-icon">📖</span><span class="cat-name">${cat}</span><span class="cat-count">(${fragenpool[cat].length})</span>`;
            btn.onclick = () => goToSetup(cat);
            grid.appendChild(btn);
        });
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    // QUIZ LOGIC
    // ═══════════════════════════════════════════════════════════════════════════════

    function startQuiz(mode) {
        currentQuizMode = mode;
        const num = parseInt(document.getElementById('question-number').value);
        questions = (fragenpool[selectedCategory] || []).slice(0, num);
        currentIdx = 0;
        showAnswer = (mode === 'learning');
        stats = { correct: 0, wrong: 0 };
        userAnswers = {};
        quizFinished = false;
        selectedAnswer = null;
        renderQuiz();
        showView('quiz-view');
    }

    function renderQuiz() {
        const q = questions[currentIdx];
        if (!q) return;

        const progress = currentIdx + 1;
        const total = questions.length;
        const percent = (progress / total) * 100;

        document.getElementById('mode-badge').textContent = currentQuizMode === 'learning' ? '📖 Learning' : '✏️ Test';
        document.getElementById('quiz-category').textContent = selectedCategory;
        document.getElementById('progress-fill').style.width = percent + '%';
        document.getElementById('progress-text').textContent = `Frage ${progress} von ${total}`;

        const statsEl = document.getElementById('stats');
        if (currentQuizMode === 'test') {
            statsEl.style.display = 'flex';
            document.getElementById('stat-correct').textContent = `✅ ${stats.correct}`;
            document.getElementById('stat-wrong').textContent = `❌ ${stats.wrong}`;
            const quota = total > 0 ? Math.round((stats.correct / total) * 100) : 0;
            document.getElementById('stat-quota').textContent = `📊 ${quota}%`;
        } else {
            statsEl.style.display = 'none';
        }

        document.getElementById('question-text').textContent = q.question;

        const answerSection = document.getElementById('answer-section');
        answerSection.innerHTML = '';

        if (q.type === 'multiple' && q.options) {
            const div = document.createElement('div');
            div.className = 'options';
            const revealAnswers = showAnswer || currentQuizMode === 'learning';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                if (revealAnswers && opt.correct) btn.classList.add('correct-answer');
                if (selectedAnswer && selectedAnswer.includes(opt.text) && !opt.correct) btn.classList.add('wrong-answer');
                if (selectedAnswer && selectedAnswer.includes(opt.text) && !revealAnswers) btn.classList.add('selected');

                btn.innerHTML = `<span class="option-checkbox"></span><span>${opt.text}</span>`;
                if (currentQuizMode === 'test' && !revealAnswers) {
                    btn.onclick = () => selectAnswer(opt.text);
                }
                btn.disabled = revealAnswers;
                div.appendChild(btn);
            });
            answerSection.appendChild(div);

            if (selectedAnswer && selectedAnswer.length > 0 && !showAnswer && !userAnswers[currentIdx]) {
                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'btn';
                confirmBtn.style.width = '100%';
                confirmBtn.style.marginTop = '20px';
                confirmBtn.textContent = '✅ Antwort bestätigen';
                confirmBtn.onclick = confirmAnswer;
                answerSection.appendChild(confirmBtn);
            }
        }

        document.getElementById('btn-prev').disabled = currentIdx === 0;
        document.getElementById('btn-next').disabled = currentIdx === questions.length - 1;
    }

    function selectAnswer(ans) {
        if (!selectedAnswer) selectedAnswer = [];
        if (selectedAnswer.includes(ans)) {
            selectedAnswer = selectedAnswer.filter(a => a !== ans);
        } else {
            selectedAnswer.push(ans);
        }
        renderQuiz();
    }

    function confirmAnswer() {
        if (!selectedAnswer || selectedAnswer.length === 0) return;
        const q = questions[currentIdx];
        const correctOptions = (q.options || []).filter(o => o.correct).map(o => o.text);
        const correct = selectedAnswer.length === correctOptions.length && 
                       selectedAnswer.every(a => correctOptions.includes(a));
        
        userAnswers[currentIdx] = { answer: selectedAnswer, isCorrect: correct };
        if (correct) stats.correct++; else stats.wrong++;

        showAnswer = true;
        selectedAnswer = null;

        if (currentIdx === questions.length - 1) {
            quizFinished = true;
        }
        renderQuiz();
    }

    function goNext() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            showAnswer = false;
            selectedAnswer = null;
            renderQuiz();
        }
    }

    function goPrev() {
        if (currentIdx > 0) {
            currentIdx--;
            showAnswer = false;
            selectedAnswer = null;
            renderQuiz();
        }
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════════════════════

    (function init() {
        if (!checkAuth()) {
            window.location.href = '/';
            return;
        }
        updateMenuUser();
        loadCategories();
        showView('menu-view');
    })();
    </script>
</body>
</html>

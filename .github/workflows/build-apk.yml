name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk \
            python3-pip python3-venv autoconf automake libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo-dev cmake libffi-dev libssl-dev \
            libjpeg-dev libsqlite3-dev ccache

      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.37 virtualenv buildozer

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('app/**') }}
          restore-keys: |
            buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-
            buildozer-${{ runner.os }}-

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          export JAVA_HOME="${JAVA_HOME_17_X64:-/usr/lib/jvm/temurin-17-jdk-amd64}"
          export PATH="$JAVA_HOME/bin:$PATH"
          echo "=== Java Version ==="
          java -version
          javac -version
          echo "=== JAVA_HOME ==="
          echo "$JAVA_HOME"
          echo "=== Files in app/ ==="
          ls -la app/
          echo "=== Cleaning old build ==="
          rm -rf bin/
          echo "=== Starting Buildozer ==="
          set -o pipefail
          yes | buildozer android debug 2>&1 | tee build.log
          echo "=== Build Exit Code: $? ==="
          echo "=== APK Suche ==="
          find . -name "*.apk" -type f
          ls -la bin/ || echo "bin/ Verzeichnis nicht gefunden"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LernApp-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log (immer)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Einstellungen - RenLern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-scan {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .device-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .device-info h3 {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .device-type {
            color: #666;
            font-size: 0.9em;
        }

        .device-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-online {
            background: #d4edda;
            color: #155724;
        }

        .status-offline {
            background: #f8d7da;
            color: #721c24;
        }

        .device-details {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .device-details p {
            margin: 6px 0;
        }

        .device-details strong {
            color: #333;
        }

        .device-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .device-actions button {
            flex: 1;
            min-width: 100px;
            padding: 10px 12px;
            font-size: 0.85em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: #f9f9ff;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .message {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px;
            text-align: center;
            color: #999;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .scan-results {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .scan-device {
            padding: 15px;
            margin: 10px 0;
            background: #f9f9ff;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .scan-device:hover {
            background: #efefff;
            border-left-color: #764ba2;
        }

        .scan-device-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .scan-device-info {
            font-size: 0.9em;
            color: #666;
        }

        .nav-links {
            text-align: center;
            margin-top: 30px;
            color: white;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .devices-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .controls button {
                width: 100%;
            }

            .device-actions {
                flex-direction: column;
            }

            .device-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Smart Home Verwaltung</h1>
            <p style="color: white; opacity: 0.9;">Verwalten Sie Ihre Smart Home Geräte</p>
        </header>

        <div id="message" class="message"></div>

        <div class="controls">
            <button onclick="openScanModal()" class="btn-scan">🔍 Netzwerk scannen</button>
            <button onclick="openAddDeviceModal()">➕ Gerät hinzufügen</button>
            <button onclick="loadDevices()">🔄 Aktualisieren</button>
        </div>

        <div id="devicesContainer" class="devices-grid">
            <div class="loading">
                <div class="spinner"></div>
                Lädt Geräte...
            </div>
        </div>

        <div class="nav-links">
            <a href="/smarthome">← Zurück zu Smart Home</a>
            <a href="/home">Home Cloud →</a>
        </div>
    </div>

    <!-- Add Device Modal -->
    <div id="addDeviceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Neues Gerät hinzufügen</div>
            <form id="addDeviceForm" onsubmit="addDevice(event)">
                <div class="form-group">
                    <label for="deviceName">Geräte-Name:</label>
                    <input type="text" id="deviceName" required>
                </div>
                <div class="form-group">
                    <label for="deviceType">Geräte-Typ:</label>
                    <select id="deviceType" required>
                        <option value="">-- Wählen --</option>
                        <option value="Lights">Beleuchtung</option>
                        <option value="Thermostat">Thermostat</option>
                        <option value="Lock">Schloss</option>
                        <option value="Camera">Kamera</option>
                        <option value="Speaker">Lautsprecher</option>
                        <option value="Plug">Steckdose</option>
                        <option value="Other">Sonstiges</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ipAddress">IP-Adresse:</label>
                    <input type="text" id="ipAddress" required placeholder="192.168.1.100">
                </div>
                <div class="form-group">
                    <label for="port">Port:</label>
                    <input type="number" id="port" value="80" required>
                </div>
                <div class="form-group">
                    <label for="authToken">Authentifizierungs-Token (optional):</label>
                    <input type="password" id="authToken" placeholder="z.B. API-Schlüssel">
                </div>
                <div class="modal-buttons">
                    <button type="submit">Hinzufügen</button>
                    <button type="button" onclick="closeAddDeviceModal()" class="btn-danger">Abbrechen</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scan Modal -->
    <div id="scanModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Netzwerk scannen</div>
            <div id="scanResults"></div>
            <button onclick="performScan()" style="margin-top: 20px;">🔍 Scan starten</button>
            <button onclick="closeScanModal()" class="btn-danger">Abbrechen</button>
        </div>
    </div>

    <!-- Edit Device Modal -->
    <div id="editDeviceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Gerät bearbeiten</div>
            <form id="editDeviceForm" onsubmit="editDevice(event)">
                <div class="form-group">
                    <label for="editDeviceName">Geräte-Name:</label>
                    <input type="text" id="editDeviceName" required>
                </div>
                <div class="form-group">
                    <label for="editDeviceType">Geräte-Typ:</label>
                    <input type="text" id="editDeviceType" disabled>
                </div>
                <div class="form-group">
                    <label for="editAuthToken">Authentifizierungs-Token:</label>
                    <input type="password" id="editAuthToken" placeholder="Neuen Token eingeben (optional)">
                </div>
                <div class="modal-buttons">
                    <button type="submit">Speichern</button>
                    <button type="button" onclick="closeEditDeviceModal()" class="btn-danger">Abbrechen</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentDeviceId = null;
        let devices = [];

        window.addEventListener('load', loadDevices);

        function loadDevices() {
            fetch('/api/smarthome/devices')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        devices = data.devices;
                        renderDevices();
                    }
                });
        }

        function renderDevices() {
            const container = document.getElementById('devicesContainer');

            if (devices.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <p>📭 Keine Geräte konfiguriert</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">Klicken Sie auf "Netzwerk scannen" oder "Gerät hinzufügen"</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = devices.map(device => `
                <div class="device-card">
                    <div class="device-header">
                        <div class="device-info">
                            <h3>🏠 ${device.device_name}</h3>
                            <p class="device-type">${device.device_type}</p>
                        </div>
                        <span class="device-status ${device.status === 'online' ? 'status-online' : 'status-offline'}">
                            ${device.status === 'online' ? '🟢 Online' : '🔴 Offline'}
                        </span>
                    </div>
                    <div class="device-details">
                        <p><strong>IP:</strong> ${device.ip_address}</p>
                        <p><strong>Port:</strong> ${device.port}</p>
                        <p><strong>Hinzugefügt:</strong> ${new Date(device.created_at).toLocaleDateString('de-DE')}</p>
                    </div>
                    <div class="device-actions">
                        <button onclick="editDeviceModal(${device.id})">✏️ Bearbeiten</button>
                        <button onclick="deleteDevice(${device.id})" class="btn-danger">🗑️ Löschen</button>
                    </div>
                </div>
            `).join('');
        }

        function openAddDeviceModal() {
            document.getElementById('addDeviceForm').reset();
            document.getElementById('addDeviceModal').classList.add('active');
        }

        function closeAddDeviceModal() {
            document.getElementById('addDeviceModal').classList.remove('active');
        }

        function openScanModal() {
            document.getElementById('scanResults').innerHTML = '<p>Klicken Sie auf "Scan starten" um Geräte zu suchen...</p>';
            document.getElementById('scanModal').classList.add('active');
        }

        function closeScanModal() {
            document.getElementById('scanModal').classList.remove('active');
        }

        function editDeviceModal(deviceId) {
            const device = devices.find(d => d.id === deviceId);
            if (!device) return;

            currentDeviceId = deviceId;
            document.getElementById('editDeviceName').value = device.device_name;
            document.getElementById('editDeviceType').value = device.device_type;
            document.getElementById('editAuthToken').value = '';
            document.getElementById('editDeviceModal').classList.add('active');
        }

        function closeEditDeviceModal() {
            document.getElementById('editDeviceModal').classList.remove('active');
        }

        function performScan() {
            const results = document.getElementById('scanResults');
            results.innerHTML = '<div class="loading"><div class="spinner"></div>Scanne Netzwerk...</div>';

            fetch('/api/smarthome/scan')
                .then (r => r.json())
                .then(data => {
                    if (data.success && data.devices.length > 0) {
                        results.innerHTML = '<h3 style="margin-bottom: 15px;">Gefundene Geräte:</h3>' + data.devices.map(device => `
                            <div class="scan-device" onclick="addScannedDevice('${device.name}', '${device.device_type}', '${device.ip_address}', ${device.port})">
                                <div class="scan-device-name">${device.name}</div>
                                <div class="scan-device-info">
                                    ${device.device_type} • IP: ${device.ip_address} • Port: ${device.port}
                                </div>
                            </div>
                        `).join('');
                    } else {
                        results.innerHTML = '<p style="color: #999;">Keine Geräte gefunden</p>';
                    }
                });
        }

        function addScannedDevice(name, type, ip, port) {
            document.getElementById('deviceName').value = name;
            document.getElementById('deviceType').value = type;
            document.getElementById('ipAddress').value = ip;
            document.getElementById('port').value = port;
            closeScanModal();
            openAddDeviceModal();
        }

        function addDevice(e) {
            e.preventDefault();

            fetch('/api/smarthome/device/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    device_name: document.getElementById('deviceName').value,
                    device_type: document.getElementById('deviceType').value,
                    ip_address: document.getElementById('ipAddress').value,
                    port: parseInt(document.getElementById('port').value),
                    auth_token: document.getElementById('authToken').value
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('✅ Gerät hinzugefügt', 'success');
                    closeAddDeviceModal();
                    loadDevices();
                } else {
                    showMessage('❌ Fehler: ' + data.message, 'error');
                }
            });
        }

        function editDevice(e) {
            e.preventDefault();

            fetch(`/api/smarthome/device/${currentDeviceId}/edit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    device_name: document.getElementById('editDeviceName').value,
                    auth_token: document.getElementById('editAuthToken').value || undefined
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('✅ Gerät aktualisiert', 'success');
                    closeEditDeviceModal();
                    loadDevices();
                } else {
                    showMessage('❌ Fehler: ' + data.message, 'error');
                }
            });
        }

        function deleteDevice(deviceId) {
            if (!confirm('Gerät wirklich löschen?')) return;

            fetch(`/api/smarthome/device/${deviceId}/delete`, {
                method: 'DELETE'
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('✅ Gerät gelöscht', 'success');
                    loadDevices();
                } else {
                    showMessage('❌ Fehler: ' + data.message, 'error');
                }
            });
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => {
                msg.className = 'message';
            }, 5000);
        }
    </script>
</body>
</html>

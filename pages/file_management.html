<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dateiverwaltung - RenLern Home Cloud</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .breadcrumb {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .breadcrumb a {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .file-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .file-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .file-size {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 12px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .file-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.85em;
        }

        .folder-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .folder-card:hover {
            transform: translateY(-5px);
        }

        .folder-name {
            color: white;
            font-weight: 600;
            font-size: 1.1em;
        }

        .message {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: #f9f9ff;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .stats {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.8);
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .nav-links {
            text-align: center;
            margin-top: 30px;
            color: white;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .file-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📁 Dateiverwaltung</h1>
            <p style="color: white; opacity: 0.9;">Home Cloud Speicher</p>
        </header>

        <div id="message" class="message"></div>

        <div class="controls">
            <div class="control-buttons">
                <button onclick="uploadFile()" class="btn-success">📤 Datei hochladen</button>
                <button onclick="createFolder()" class="btn-success">📁 Neuer Ordner</button>
                <button onclick="reloadFiles()" >🔄 Aktualisieren</button>
            </div>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Lädt Dateien...
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="fileCount">0</div>
                <div class="stat-label">Dateien</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="folderCount">0</div>
                <div class="stat-label">Ordner</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSize">0 MB</div>
                <div class="stat-label">Speicher</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="/home">← Zurück zu Home Cloud</a> |
            <a href="/account">Konto</a>
        </div>
    </div>

    <!-- Upload File Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">📤 Datei hochladen</div>
            <form onsubmit="submitFileUpload(event)">
                <div class="form-group">
                    <label for="fileCategory">Kategorie:</label>
                    <select id="fileCategory" required>
                        <option value="">-- Wählen Sie eine Kategorie --</option>
                        <option value="bilder">📷 Bilder</option>
                        <option value="musik">🎵 Musik</option>
                        <option value="videos">🎬 Videos</option>
                        <option value="dokumente">📄 Dokumente</option>
                        <option value="sonstiges">📦 Sonstiges</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="uploadFile">Datei:</label>
                    <input type="file" id="uploadFile" required>
                </div>
                <div class="modal-buttons">
                    <button type="submit">Hochladen</button>
                    <button type="button" onclick="closeUploadModal()" class="btn-danger">Abbrechen</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Folder Modal -->
    <div id="folderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">📁 Neuen Ordner erstellen</div>
            <form onsubmit="submitCreateFolder(event)">
                <div class="form-group">
                    <label for="folderName">Ordnername:</label>
                    <input type="text" id="folderName" required placeholder="z.B. Urlaubsfotos">
                </div>
                <div class="modal-buttons">
                    <button type="submit">Erstellen</button>
                    <button type="button" onclick="closeFolderModal()" class="btn-danger">Abbrechen</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentPath = '';
        let files = [];

        window.addEventListener('load', loadFiles);

        function loadFiles() {
            const userId = new URLSearchParams(window.location.search).get('user_id') || 
                          sessionStorage.getItem('user_id') || 1;
            
            fetch(`/api/files/list?user_id=${userId}&path=${encodeURIComponent(currentPath)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        files = data.files || [];
                        renderFiles();
                        updateStats(data);
                    } else {
                        showMessage('Fehler beim Laden: ' + data.message, 'error');
                    }
                })
                .catch(e => showMessage('Fehler: ' + e.message, 'error'));
        }

        function renderFiles() {
            const content = document.getElementById('content');
            
            if (files.length === 0) {
                content.innerHTML = '<div class="empty-state"><h2>📭</h2><p>Keine Dateien oder Ordner</p></div>';
                return;
            }

            let html = '<div class="file-grid">';

            // Ordner zuerst
            files.filter(f => f.is_dir).forEach(f => {
                html += `
                    <div class="folder-card" onclick="navigateFolder('${f.name}')">
                        <div style="font-size: 2.5em; margin-bottom: 10px;">📁</div>
                        <div class="folder-name">${f.name}</div>
                    </div>
                `;
            });

            // Dann Dateien
            files.filter(f => !f.is_dir).forEach(f => {
                const sizeKB = (f.size / 1024).toFixed(1);
                const icon = getFileIcon(f.name);
                
                html += `
                    <div class="file-card">
                        <div class="file-icon">${icon}</div>
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${sizeKB} KB</div>
                        <div class="file-actions">
                            <button onclick="downloadFile('${f.name}')" class="btn-success">⬇️</button>
                            <button onclick="deleteFile('${f.name}')" class="btn-danger">🗑️</button>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            content.innerHTML = html;
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📄',
                'doc': '📝', 'docx': '📝',
                'xls': '📊', 'xlsx': '📊',
                'ppt': '🎞️', 'pptx': '🎞️',
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
                'mp3': '🎵', 'wav': '🎵', 'flac': '🎵',
                'mp4': '🎬', 'avi': '🎬', 'mkv': '🎬',
                'zip': '📦', 'rar': '📦', '7z': '📦'
            };
            return icons[ext] || '📄';
        }

        function updateStats(data) {
            const stats = data.stats || {};
            document.getElementById('fileCount').textContent = stats.file_count || 0;
            document.getElementById('folderCount').textContent = stats.folder_count || 0;
            
            const sizeMB = data.total_size_bytes 
                ? (data.total_size_bytes / (1024 * 1024)).toFixed(1) 
                : 0;
            document.getElementById('totalSize').textContent = sizeMB + ' MB';
        }

        function navigateFolder(folderName) {
            currentPath = currentPath ? currentPath + '/' + folderName : folderName;
            loadFiles();
        }

        function uploadFile() {
            document.getElementById('uploadModal').classList.add('active');
            document.getElementById('uploadFile').value = '';
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
        }

        function submitFileUpload(e) {
            e.preventDefault();
            
            const file = document.getElementById('uploadFile').files[0];
            const category = document.getElementById('fileCategory').value;
            const userId = sessionStorage.getItem('user_id') || 1;

            if (!file) {
                showMessage('Datei erforderlich', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('user_id', userId);
            formData.append('category', category);

            fetch('/api/files/upload', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('✅ Datei hochgeladen', 'success');
                    closeUploadModal();
                    loadFiles();
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            })
            .catch(e => showMessage('Fehler: ' + e.message, 'error'));
        }

        function createFolder() {
            document.getElementById('folderModal').classList.add('active');
            document.getElementById('folderName').value = '';
        }

        function closeFolderModal() {
            document.getElementById('folderModal').classList.remove('active');
        }

        function submitCreateFolder(e) {
            e.preventDefault();
            
            const folderName = document.getElementById('folderName').value;
            const userId = sessionStorage.getItem('user_id') || 1;

            fetch('/api/files/mkdir', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    folder_name: folderName,
                    path: currentPath
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('✅ Ordner erstellt', 'success');
                    closeFolderModal();
                    loadFiles();
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            })
            .catch(e => showMessage('Fehler: ' + e.message, 'error'));
        }

        function downloadFile(filename) {
            const userId = sessionStorage.getItem('user_id') || 1;
            window.location.href = `/api/files/download?user_id=${userId}&path=${encodeURIComponent(currentPath + '/' + filename)}`;
        }

        function deleteFile(filename) {
            if (!confirm(`Datei "${filename}" wirklich löschen?`)) return;

            const userId = sessionStorage.getItem('user_id') || 1;
            fetch('/api/files/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    path: currentPath + '/' + filename
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('✅ Datei gelöscht', 'success');
                    loadFiles();
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            })
            .catch(e => showMessage('Fehler: ' + e.message, 'error'));
        }

        function reloadFiles() {
            loadFiles();
            showMessage('Aktualisiert', 'success');
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => {
                msg.className = 'message';
            }, 5000);
        }
    </script>
</body>
</html>

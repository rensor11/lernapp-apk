<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontoeinstellungen - RenLern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f9f9ff;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-secondary {
            background: #999;
        }

        .message {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.95em;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .profile-info {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .profile-info p {
            margin: 8px 0;
            color: #666;
        }

        .profile-info strong {
            color: #333;
        }

        .nav-links {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .password-strength {
            margin-top: 8px;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.85em;
            display: none;
        }

        .strength-weak {
            background: #f8d7da;
            color: #721c24;
        }

        .strength-medium {
            background: #fff3cd;
            color: #856404;
        }

        .strength-strong {
            background: #d4edda;
            color: #155724;
        }

        @media (max-width: 600px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Kontoeinstellungen</h1>
            <p id="username-display">Willkommen zurück!</p>
        </header>

        <div class="settings-grid">
            <!-- Password Change Card -->
            <div class="card">
                <h2><span class="icon">🔑</span> Passwort ändern</h2>
                <div id="password-message" class="message"></div>
                <form id="password-form" onsubmit="changePassword(event)">
                    <div class="form-group">
                        <label for="current_password">Aktuelles Passwort:</label>
                        <input type="password" id="current_password" required>
                    </div>
                    <div class="form-group">
                        <label for="new_password">Neues Passwort:</label>
                        <input type="password" id="new_password" required>
                        <div id="password-strength" class="password-strength"></div>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Passwort bestätigen:</label>
                        <input type="password" id="confirm_password" required>
                    </div>
                    <button type="submit">Passwort aktualisieren</button>
                </form>
            </div>

            <!-- Profile Card -->
            <div class="card">
                <h2><span class="icon">👤</span> Profil</h2>
                <div class="profile-info" id="profile-info">
                    <p><strong>Benutzername:</strong> <span id="profile-username">-</span></p>
                    <p><strong>Mitglied seit:</strong> <span id="profile-created">-</span></p>
                    <p><strong>Konto-ID:</strong> <span id="profile-id">-</span></p>
                </div>
                <button onclick="refreshProfile()">Profil aktualisieren</button>
            </div>

            <!-- Delete Account Card -->
            <div class="card">
                <h2><span class="icon">⚠️</span> Konto löschen</h2>
                <p style="color: #666; margin-bottom: 15px; font-size: 0.95em;">
                    Diese Aktion kann nicht rückgängig gemacht werden. Alle Ihrer Daten werden permanent gelöscht.
                </p>
                <div id="delete-message" class="message"></div>
                <form id="delete-form" onsubmit="deleteAccount(event)">
                    <div class="form-group">
                        <label for="delete_password">Passwort zur Bestätigung:</label>
                        <input type="password" id="delete_password" required>
                    </div>
                    <button type="submit" class="btn-danger">Konto permanent löschen</button>
                </form>
            </div>
        </div>

        <div class="nav-links">
            <a href="/home">← Zurück zur Home Cloud</a>
            <a href="/lernapp">Quiz →</a>
            <a href="/smarthome">Smart Home →</a>
            <a href="#" onclick="logout()">Abmelden</a>
        </div>
    </div>

    <script>
        // Load initial profile
        window.addEventListener('load', function() {
            loadProfile();
            setupPasswordStrengthMeter();
        });

        function loadProfile() {
            fetch('/api/user/profile')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('username-display').textContent = `Willkommen, ${data.user.username}!`;
                        document.getElementById('profile-username').textContent = data.user.username;
                        document.getElementById('profile-created').textContent = new Date(data.user.created_at).toLocaleDateString('de-DE');
                        document.getElementById('profile-id').textContent = data.user.id;
                    }
                });
        }

        function refreshProfile() {
            loadProfile();
            showMessage('profile-info', 'Profil aktualisiert', 'success');
        }

        function setupPasswordStrengthMeter() {
            const pwd = document.getElementById('new_password');
            pwd.addEventListener('input', function() {
                const strength = calculatePasswordStrength(this.value);
                const indicator = document.getElementById('password-strength');
                
                if (this.value.length === 0) {
                    indicator.style.display = 'none';
                } else {
                    indicator.style.display = 'block';
                    indicator.className = 'password-strength';
                    
                    if (strength < 30) {
                        indicator.className += ' strength-weak';
                        indicator.textContent = '⚠️ Schwaches Passwort (mind. 6 Zeichen)';
                    } else if (strength < 60) {
                        indicator.className += ' strength-medium';
                        indicator.textContent = '⚠️ Mittleres Passwort (add Großbuchstaben + Zahlen)';
                    } else {
                        indicator.className += ' strength-strong';
                        indicator.textContent = '✅ Starkes Passwort';
                    }
                }
            });
        }

        function calculatePasswordStrength(pwd) {
            let strength = 0;
            if (pwd.length >= 6) strength += 20;
            if (pwd.length >= 8) strength += 10;
            if (/[a-z]/.test(pwd)) strength += 10;
            if (/[A-Z]/.test(pwd)) strength += 20;
            if (/[0-9]/.test(pwd)) strength += 20;
            if (/[^a-zA-Z0-9]/.test(pwd)) strength += 20;
            return Math.min(strength, 100);
        }

        function changePassword(e) {
            e.preventDefault();
            
            const current = document.getElementById('current_password').value;
            const newPwd = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (newPwd !== confirm) {
                showMessage('password-message', 'Passwörter stimmen nicht überein!', 'error');
                return;
            }

            fetch('/api/user/password/change', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    current_password: current,
                    new_password: newPwd,
                    confirm_password: confirm
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('password-message', '✅ Passwort erfolgreich geändert!', 'success');
                    document.getElementById('password-form').reset();
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showMessage('password-message', '❌ Fehler: ' + data.message, 'error');
                }
            });
        }

        function deleteAccount(e) {
            e.preventDefault();
            
            if (!confirm('⚠️ WARNUNG: Diese Aktion kann nicht rückgängig gemacht werden!\n\nMöchten Sie Ihren Account wirklich löschen?')) {
                return;
            }

            const password = document.getElementById('delete_password').value;

            fetch('/api/user/delete', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('delete-message', '✅ Konto gelöscht. Sie werden weitergeleitet...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    showMessage('delete-message', '❌ Fehler: ' + data.message, 'error');
                }
            });
        }

        function logout() {
            if (confirm('Abmelden?')) {
                fetch('/api/logout', { method: 'POST' })
                    .then(() => window.location.href = '/');
            }
        }

        function showMessage(elementId, text, type) {
            const msg = document.getElementById(elementId);
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
    </script>
</body>
</html>

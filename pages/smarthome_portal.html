<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Portal - RenLern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .message {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: none;
            border-left: 4px solid #999;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left-color: #28a745;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left-color: #dc3545;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left-color: #17a2b8;
            display: block;
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .device-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .device-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .device-info h3 {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .device-type {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .device-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-online {
            background: #d4edda;
            color: #155724;
        }

        .status-offline {
            background: #f8d7da;
            color: #721c24;
        }

        .status-on {
            background: #d4edda;
            color: #155724;
        }

        .status-off {
            background: #e7e8ea;
            color: #383d41;
        }

        .device-details {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .device-details p {
            margin: 6px 0;
            word-break: break-all;
        }

        .device-details strong {
            color: #333;
        }

        .device-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .device-controls button {
            flex: 1;
            min-width: 80px;
            padding: 10px 8px;
            font-size: 0.85em;
        }

        .tag {
            display: inline-block;
            background: #f0f0f0;
            color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-top: 5px;
            margin-right: 5px;
        }

        .tag.homeassistant {
            background: #41bdf5;
            color: white;
        }

        .tag.network {
            background: #ff9f43;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px;
            text-align: center;
            color: #999;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-box h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-box p {
            color: #666;
            font-size: 0.9em;
        }

        .nav-links {
            text-align: center;
            margin-top: 30px;
            color: white;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .devices-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .controls button {
                width: 100%;
            }

            .device-controls button {
                width: 100%;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Smart Home Portal</h1>
            <p>Kontrolliere dein ganzes Netzwerk und alle Smart Home Geräte</p>
        </header>

        <div id="message" class="message"></div>

        <div class="controls">
            <button onclick="loadAllDevices()" class="btn-info">🔍 Alle Geräte laden</button>
            <button onclick="loadAllDevices()" class="btn-success">🔄 Aktualisieren</button>
            <button onclick="goToSettings()">⚙️ Einstellungen</button>
        </div>

        <div id="statsContainer" class="stats" style="display: none;">
            <div class="stat-box">
                <h3 id="totalDevices">0</h3>
                <p>Gesamt Geräte</p>
            </div>
            <div class="stat-box">
                <h3 id="networkDevices">0</h3>
                <p>Netzwerk-Geräte</p>
            </div>
            <div class="stat-box">
                <h3 id="haDevices">0</h3>
                <p>Smart Home</p>
            </div>
        </div>

        <div id="devicesContainer" class="devices-grid">
            <div class="loading">
                <div class="spinner"></div>
                Lädt Geräte...
            </div>
        </div>

        <div class="nav-links">
            <a href="/smarthome-settings">← Einstellungen</a>
            <a href="/home">Home Cloud →</a>
        </div>
    </div>

    <script>
        let allDevices = [];

        window.addEventListener('load', loadAllDevices);

        function loadAllDevices() {
            showMessage('Lade alle Geräte...', 'info');
            const container = document.getElementById('devicesContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Lade Geräte...</div>';

            fetch('/api/smarthome/discover')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        allDevices = data.devices || [];
                        renderDevices();
                        updateStats(data);
                        showMessage(`${allDevices.length} Geräte geladen!`, 'success');
                    } else {
                        container.innerHTML = `<div class="empty-state"><p>❌ Fehler: ${data.message}</p></div>`;
                        showMessage(data.message, 'error');
                    }
                })
                .catch(e => {
                    container.innerHTML = `<div class="empty-state"><p>❌ Fehler: ${e.message}</p></div>`;
                    showMessage('Fehler beim Laden der Geräte: ' + e.message, 'error');
                });
        }

        function updateStats(data) {
            document.getElementById('totalDevices').textContent = data.total || 0;
            document.getElementById('networkDevices').textContent = data.network_devices || 0;
            document.getElementById('haDevices').textContent = data.homeassistant_devices || 0;
            document.getElementById('statsContainer').style.display = 'grid';
        }

        function renderDevices() {
            const container = document.getElementById('devicesContainer');

            if (allDevices.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <p>📭 Keine Geräte gefunden</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">Stelle sicher, dass dein Netzwerk und deine Smart Home Systeme aktiv sind</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = allDevices.map(device => {
                const icon = getDeviceIcon(device.type);
                const domain = device.domain || 'unknown';
                const tag = domain === 'homeassistant' ? 'Home Assistant' : 'Netzwerk';
                
                return `
                    <div class="device-card">
                        <div class="device-icon">${icon}</div>
                        <div class="device-header">
                            <div class="device-info">
                                <h3>${escapeHtml(device.name)}</h3>
                                <p class="device-type">${formatType(device.type)}</p>
                            </div>
                        </div>
                        <div class="device-details">
                            ${device.ip ? `<p><strong>IP:</strong> ${device.ip}</p>` : ''}
                            ${device.mac ? `<p><strong>MAC:</strong> ${device.mac}</p>` : ''}
                            ${device.state ? `<p><strong>Status:</strong> ${device.state}</p>` : ''}
                            ${device.port ? `<p><strong>Port:</strong> ${device.port}</p>` : ''}
                        </div>
                        <div style="margin-bottom: 10px;">
                            <span class="tag ${domain}">${tag}</span>
                            ${device.status ? `<span class="tag device-status status-${device.status.toLowerCase()}">${device.status}</span>` : ''}
                        </div>
                        ${renderDeviceControls(device)}
                    </div>
                `;
            }).join('');
        }

        function renderDeviceControls(device) {
            if (!device.controllable) {
                return '<div class="device-controls"><button disabled>Schreibgeschützt</button></div>';
            }

            const type = device.type || '';
            
            if (type === 'light' || type === 'switch') {
                return `
                    <div class="device-controls">
                        <button onclick="controlDevice('${device.id}', 'turn_on')">🟢 An</button>
                        <button onclick="controlDevice('${device.id}', 'turn_off')" class="btn-danger">⚫ Aus</button>
                    </div>
                `;
            } else if (type === 'climate') {
                return `
                    <div class="device-controls">
                        <button onclick="controlDevice('${device.id}', 'heat_cool')">🌡️ Auto</button>
                        <button onclick="controlDevice('${device.id}', 'heat')">🔥 Heizen</button>
                    </div>
                `;
            } else if (type === 'cover') {
                return `
                    <div class="device-controls">
                        <button onclick="controlDevice('${device.id}', 'open')">📖 Öffnen</button>
                        <button onclick="controlDevice('${device.id}', 'close')" class="btn-danger">📕 Schließen</button>
                    </div>
                `;
            } else if (type === 'lock') {
                return `
                    <div class="device-controls">
                        <button onclick="controlDevice('${device.id}', 'lock')">🔐 Sperren</button>
                        <button onclick="controlDevice('${device.id}', 'unlock')" class="btn-danger">🔓 Entsperren</button>
                    </div>
                `;
            } else {
                return `
                    <div class="device-controls">
                        <button onclick="controlDevice('${device.id}', 'toggle')">🔄 Umschalten</button>
                    </div>
                `;
            }
        }

        function controlDevice(deviceId, command) {
            showMessage(`Sende Befehl: ${command}...`, 'info');

            fetch(`/api/smarthome/device/${deviceId}/control`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: command })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage(`✓ ${data.message}`, 'success');
                    setTimeout(() => loadAllDevices(), 500);
                } else {
                    showMessage(`✗ ${data.message}`, 'error');
                }
            })
            .catch(e => showMessage('Fehler: ' + e.message, 'error'));
        }

        function getDeviceIcon(type) {
            const icons = {
                'light': '💡',
                'switch': '🔲',
                'climate': '🌡️',
                'cover': '🪟',
                'lock': '🔐',
                'fan': '🌀',
                'vacuum': '🤖',
                'network_device': '🖥️',
                'default': '⚙️'
            };
            return icons[type] || icons['default'];
        }

        function formatType(type) {
            const names = {
                'light': 'Beleuchtung',
                'switch': 'Schalter',
                'climate': 'Klima/Temperatur',
                'cover': 'Rolläden',
                'lock': 'Schloss',
                'fan': 'Lüfter',
                'vacuum': 'Staubsauger',
                'network_device': 'Netzwerk Gerät'
            };
            return names[type] || type;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => {
                msg.className = 'message';
            }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function goToSettings() {
            window.location.href = '/smarthome-settings';
        }
    </script>
</body>
</html>
